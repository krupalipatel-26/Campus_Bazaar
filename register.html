<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusBazaar - Register</title>

    <link rel="stylesheet" href="../CampusBazzar/css/register.css">
</head>
<body>

    <!-- Navbar -->

    <nav class="navbar">

        <div class="logo">
            🎓 CampusBazaar
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="Product.html">Products</a></li>
            <li><a href="Login.html">Login</a></li>
        </ul>

    </nav>

    <!-- Registration Section -->

    <section class="register-section">

        <div class="register-container">

            <h1>Create Account</h1>

            <p>Join CampusBazaar and start buying & selling.</p>

            <form>

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your full name" required>
                </div>

                <div class="input-group">
                    <label>College Name</label>
                    <input type="text" placeholder="Enter your college name" required>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" placeholder="Enter your phone number" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Create password" required>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" placeholder="Confirm password" required>
                </div>

                <button type="submit" class="register-btn">
                    Create Account
                </button>

            </form>

            <div class="login-link">
                Already have an account?
                <a href="Login.html">Login Here</a>
            </div>

        </div>

    </section>

    <!-- Footer -->

    <footer>
       <p>© 2026 CampusBazaar | All Rights Reserved</p>
    </footer>

</body>
</html>
